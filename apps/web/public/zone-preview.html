<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yalla.House — Zone Transitions</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; }
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

/* ── THREE ZONE PALETTES ─────────────────────────────
   Zone 1: Dark (hero, stats, how it works)
   Zone 2: Clean white (why yalla, three paths)
   Zone 3: Deep dark (CTA)
   Each zone section owns its own background so text
   is always readable regardless of scroll position.
   ──────────────────────────────────────────────────── */

var Z1 = {
  bg: "#0D0D0D", surface: "#161616",
  border: "rgba(255,255,255,0.08)", accent: "#D4764E",
  text: "#FFFFFF", textSub: "rgba(255,255,255,0.62)",
  textMuted: "rgba(255,255,255,0.40)",
  cardIcon: "rgba(212,118,78,0.10)",
};

var Z2 = {
  bg: "#F5F5F5", surface: "#FFFFFF",
  border: "rgba(0,0,0,0.08)", accent: "#C4603A",
  text: "#1A1A1A", textSub: "#555555",
  textMuted: "#888888",
  cardIcon: "rgba(196,96,58,0.08)",
};

var Z3 = {
  bg: "#06060A", surface: "#0E0E14",
  border: "rgba(140,140,200,0.10)", accent: "#D4764E",
  text: "#E8E8F0", textSub: "rgba(200,200,220,0.55)",
  textMuted: "rgba(180,180,200,0.35)",
  cardIcon: "rgba(100,100,160,0.12)",
};

/* ── SHARED COMPONENTS (each takes a zone palette) ── */

function Hero(p) {
  var z = p.z;
  return e("div", { style: { padding: "80px 40px 60px", textAlign: "center" } },
    e("div", { style: { display: "flex", justifyContent: "center", gap: 8, marginBottom: 40 } },
      e("button", { style: { background: z.accent, color: "#fff", border: "none", padding: "8px 20px", borderRadius: 20, fontSize: 14, fontWeight: 600, cursor: "pointer" } }, "I'm selling"),
      e("button", { style: { background: z === Z1 ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)", color: z.textSub, border: "1px solid " + z.border, padding: "8px 20px", borderRadius: 20, fontSize: 14, cursor: "pointer" } }, "I'm searching"),
    ),
    e("h1", { style: { fontSize: 48, fontWeight: 800, color: z.text, lineHeight: 1.1, margin: "0 0 20px", letterSpacing: "-0.022em" } },
      "Your property ", e("span", { style: { color: z.accent } }, "rental"), ",", e("br"), "under your control."
    ),
    e("p", { style: { color: z.textSub, fontSize: 17, maxWidth: 600, margin: "0 auto 32px", lineHeight: 1.5 } },
      "Yalla.House is a property technology platform \u2014 not an estate agency. Get a free dashboard with market data, manage viewings, and sell your way."
    ),
    e("div", { style: { display: "flex", justifyContent: "center", gap: 16, alignItems: "center" } },
      e("button", { style: { background: z.accent, color: "#fff", border: "none", padding: "14px 28px", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer" } }, "Create your free dashboard \u2192"),
      e("span", { style: { color: z.textMuted, fontSize: 14 } }, "I'm an agent \u2192"),
    )
  );
}

function Stats(p) {
  var z = p.z;
  var stats = [
    { v: "\u00A35,000+", l: "Average agent commission on a UK property sale" },
    { v: "69%", l: "of owners want weekly updates but don't get them" },
    { v: "\u00A30", l: "Cost of your Yalla owner dashboard \u2014 always free" },
    { v: "2 min", l: "to create your dashboard and see your market data" },
  ];
  return e("div", { style: { padding: "40px 40px", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 } },
    stats.map(function(s, i) {
      return e("div", { key: i, style: {
        background: z.surface, border: "1px solid " + z.border, borderRadius: 12,
        padding: "24px 20px", textAlign: "center",
      }},
        e("div", { style: { fontSize: 28, fontWeight: 800, color: z.accent, marginBottom: 8 } }, s.v),
        e("div", { style: { fontSize: 13, color: z.textSub, lineHeight: 1.4 } }, s.l)
      );
    })
  );
}

function HowItWorks(p) {
  var z = p.z;
  var steps = [
    { n: "01", t: "Create your dashboard", d: "Enter your address and get a free owner dashboard with local market data, comparable sales, and a timeline for your sale." },
    { n: "02", t: "Sell your way", d: "List privately and manage it yourself, or send your Owner Brief to competing agents. They respond with real proposals \u2014 you compare and choose." },
    { n: "03", t: "Stay in control", d: "Track every viewing, offer, and update in real time. Whether you're selling privately or through an agent, your dashboard keeps everything in one place." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: z.text, textAlign: "center", marginBottom: 12 } }, "How it works"),
    e("p", { style: { color: z.textSub, textAlign: "center", marginBottom: 40, fontSize: 15 } }, "Three steps. No commission. Full control."),
    e("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 } },
      steps.map(function(s, i) {
        return e("div", { key: i, style: {
          background: z.surface, border: "1px solid " + z.border, borderRadius: 14, padding: "28px 24px",
        }},
          e("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 16 } },
            e("div", { style: { width: 40, height: 40, borderRadius: 10, background: z.cardIcon, display: "flex", alignItems: "center", justifyContent: "center" } },
              e("span", { style: { color: z.accent, fontSize: 13, fontWeight: 700 } }, "\u2B21")
            ),
            e("span", { style: { fontSize: 12, fontWeight: 700, color: z.textMuted, letterSpacing: "0.08em", textTransform: "uppercase" } }, "STEP " + s.n)
          ),
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: z.text, marginBottom: 12 } }, s.t),
          e("p", { style: { fontSize: 14, color: z.textSub, lineHeight: 1.5, margin: 0 } }, s.d)
        );
      })
    )
  );
}

function WhyYalla(p) {
  var z = p.z;
  var items = [
    { t: "You get a dashboard. Not a bill.", d: "Every other platform charges you to list. We give you a free dashboard first \u2014 market data, comparable sales, a timeline for your sale." },
    { t: "Your data, always.", d: "Track every viewing, every offer, every piece of feedback in one place. If you instruct an agent, they connect to your dashboard." },
    { t: "We're not agents. We're your tools.", d: "Yalla is a technology platform, not an estate agency. We don't take commission. We give you the information and connections to make the best decision." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: z.text, textAlign: "center", marginBottom: 48 } }, "Why Yalla?"),
    e("div", { style: { maxWidth: 700, margin: "0 auto" } },
      items.map(function(item, i) {
        return e("div", { key: i, style: { borderLeft: "3px solid " + z.accent, paddingLeft: 24, marginBottom: 36 } },
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: z.text, marginBottom: 8 } }, item.t),
          e("p", { style: { fontSize: 14, color: z.textSub, lineHeight: 1.5, margin: 0 } }, item.d)
        );
      })
    )
  );
}

function ThreePaths(p) {
  var z = p.z;
  var paths = [
    { icon: "\uD83C\uDFE0", t: "For Owners", sub: "Free forever. No commission.", d: "Get a free dashboard with market data and comparable sales. Sell entirely on your own, or invite agents to compete for your instruction." },
    { icon: "\uD83D\uDD0D", t: "For Home Hunters", sub: "Find your next home.", d: "Create your Home Passport and we'll search portals on your behalf. We match you with accredited local agents." },
    { icon: "\uD83D\uDCCB", t: "For Agents", sub: "Win new instructions.", d: "Receive Owner Briefs from motivated sellers in your area. Respond with your proposal and win the instruction \u2014 on merit, not marketing spend." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 } },
      paths.map(function(p2, i) {
        return e("div", { key: i, style: {
          background: z.surface, border: "1px solid " + z.border, borderRadius: 14, padding: "28px 24px",
        }},
          e("div", { style: { width: 44, height: 44, borderRadius: 10, background: z.cardIcon, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, marginBottom: 16 } }, p2.icon),
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: z.text, marginBottom: 4 } }, p2.t),
          e("p", { style: { fontSize: 13, color: z.accent, marginBottom: 12, fontWeight: 600 } }, p2.sub),
          e("p", { style: { fontSize: 14, color: z.textSub, lineHeight: 1.5, margin: "0 0 16px" } }, p2.d),
          e("span", { style: { color: z.accent, fontSize: 14, fontWeight: 600 } }, "Get started \u2192")
        );
      })
    )
  );
}

function CTA(p) {
  var z = p.z;
  return e("div", { style: { padding: "80px 40px", textAlign: "center", position: "relative", overflow: "hidden" } },
    e("div", { style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, rgba(212,118,78,0.12) 0%, transparent 70%)", pointerEvents: "none" } }),
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: z.text, marginBottom: 16, position: "relative" } }, "Ready to take control", e("br"), "of your sale?"),
    e("p", { style: { color: z.textSub, fontSize: 15, marginBottom: 32, position: "relative" } }, "Create your free dashboard in under two minutes."),
    e("button", { style: { background: "#D4764E", color: "#fff", border: "none", padding: "14px 28px", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer", position: "relative" } }, "Create your free dashboard \u2192")
  );
}

/* ── TRANSITION DIVIDERS ──────────────────────────── */

/* Dark-to-light gradient fade */
function DarkToLightDivider() {
  return e("div", { style: { height: 120, position: "relative", overflow: "hidden" } },
    /* Gradient from dark to light */
    e("div", { style: {
      position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
      background: "linear-gradient(180deg, " + Z1.bg + " 0%, #3A3A3A 30%, #8A8A8A 55%, #C8C8C8 75%, " + Z2.bg + " 100%)",
    }}),
    /* Brand accent line in the middle */
    e("div", { style: {
      position: "absolute", top: "45%", left: "15%", right: "15%", height: 2,
      background: "linear-gradient(90deg, transparent, #D4764E 30%, #E8A87C 50%, #D4764E 70%, transparent)",
      opacity: 0.6,
    }}),
    /* Glow behind the line */
    e("div", { style: {
      position: "absolute", top: "35%", left: "10%", right: "10%", height: 40,
      background: "linear-gradient(90deg, transparent, rgba(212,118,78,0.12) 30%, rgba(212,118,78,0.20) 50%, rgba(212,118,78,0.12) 70%, transparent)",
      filter: "blur(16px)", pointerEvents: "none",
    }})
  );
}

/* Light-to-dark gradient fade */
function LightToDarkDivider() {
  return e("div", { style: { height: 120, position: "relative", overflow: "hidden" } },
    e("div", { style: {
      position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
      background: "linear-gradient(180deg, " + Z2.bg + " 0%, #C8C8C8 25%, #8A8A8A 45%, #3A3A3A 70%, " + Z3.bg + " 100%)",
    }}),
    e("div", { style: {
      position: "absolute", top: "50%", left: "15%", right: "15%", height: 2,
      background: "linear-gradient(90deg, transparent, #D4764E 30%, #E8A87C 50%, #D4764E 70%, transparent)",
      opacity: 0.6,
    }}),
    e("div", { style: {
      position: "absolute", top: "40%", left: "10%", right: "10%", height: 40,
      background: "linear-gradient(90deg, transparent, rgba(212,118,78,0.12) 30%, rgba(212,118,78,0.20) 50%, rgba(212,118,78,0.12) 70%, transparent)",
      filter: "blur(16px)", pointerEvents: "none",
    }})
  );
}

/* ── ZONE INDICATOR ──────────────────────────────── */
function ZoneIndicator(p) {
  var zone = p.zone;
  var labels = ["Zone 1 \u2014 Dark", "Zone 2 \u2014 Light", "Zone 3 \u2014 Deep"];
  var bgs = ["rgba(255,255,255,0.12)", "rgba(0,0,0,0.06)", "rgba(255,255,255,0.12)"];
  var borders = ["rgba(255,255,255,0.15)", "rgba(0,0,0,0.12)", "rgba(255,255,255,0.12)"];
  var colors = ["rgba(255,255,255,0.55)", "#C4603A", "rgba(200,200,220,0.6)"];
  return e("div", { style: {
    position: "sticky", top: 8, zIndex: 50, display: "flex", justifyContent: "center", pointerEvents: "none",
  }},
    e("div", { style: {
      background: bgs[zone], backdropFilter: "blur(8px)",
      padding: "6px 16px", borderRadius: 20, fontSize: 12, fontWeight: 700,
      color: colors[zone], letterSpacing: "0.05em",
      transition: "all 0.5s cubic-bezier(0.16,1,0.3,1)",
      border: "1px solid " + borders[zone],
    }}, labels[zone])
  );
}

/* ── MAIN PREVIEW ──────────────────────────────────── */
function Preview() {
  var activeZone = useRef(0);
  var wrapperRef = useRef(null);
  var z1Ref = useRef(null);
  var z2Ref = useRef(null);
  var z3Ref = useRef(null);
  var counter = useState(0);
  var forceUpdate = counter[1];

  useEffect(function() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && entry.intersectionRatio > 0.15) {
          var newZone = entry.target === z1Ref.current ? 0 : entry.target === z2Ref.current ? 1 : 2;
          if (newZone !== activeZone.current) {
            activeZone.current = newZone;
            forceUpdate(function(n) { return n + 1; });
          }
        }
      });
    }, { threshold: [0.15], root: wrapperRef.current });
    [z1Ref, z2Ref, z3Ref].forEach(function(r) { if (r.current) obs.observe(r.current); });
    return function() { obs.disconnect(); };
  }, []);

  var zone = activeZone.current;

  return e("div", { ref: wrapperRef, style: {
    overflowY: "auto", maxHeight: 650, position: "relative",
    /* No wrapper background transition — each zone owns its own bg */
    background: "#000",
  }},
    e(ZoneIndicator, { zone: zone }),

    /* ── ZONE 1: Dark ─────────────────────────── */
    e("div", { ref: z1Ref, style: {
      background: Z1.bg, position: "relative", zIndex: 2,
    }},
      e(Hero, { z: Z1 }),
      e(Stats, { z: Z1 }),
      e(HowItWorks, { z: Z1 })
    ),

    /* ── TRANSITION: Dark → Light ─────────────── */
    e(DarkToLightDivider),

    /* ── ZONE 2: Clean White ──────────────────── */
    e("div", { ref: z2Ref, style: {
      background: Z2.bg, position: "relative", zIndex: 2,
    }},
      e(WhyYalla, { z: Z2 }),
      e(ThreePaths, { z: Z2 })
    ),

    /* ── TRANSITION: Light → Dark ─────────────── */
    e(LightToDarkDivider),

    /* ── ZONE 3: Deep ─────────────────────────── */
    e("div", { ref: z3Ref, style: {
      background: Z3.bg, position: "relative", zIndex: 2,
    }},
      e(CTA, { z: Z3 })
    )
  );
}

/* ── APP SHELL ──────────────────────────────────────── */
function App() {
  return e("div", { style: { minHeight: "100vh", background: "#000" } },
    /* ── Header ─── */
    e("div", { style: { position: "sticky", top: 0, zIndex: 100, background: "rgba(0,0,0,0.92)", backdropFilter: "blur(16px)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "14px 24px" } },
      e("div", { style: { maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" } },
        e("span", { style: { color: "#D4764E", fontWeight: 800, fontSize: 16 } }, "\uD83C\uDFE0 Zone Transitions \u2014 Dark \u2192 White \u2192 Deep"),
        e("div", { style: { display: "flex", gap: 12, alignItems: "center" } },
          e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
            e("div", { style: { width: 28, height: 16, borderRadius: 4, background: Z1.bg, border: "1px solid rgba(255,255,255,0.2)" } }),
            e("span", { style: { fontSize: 11, color: "rgba(255,255,255,0.4)" } }, "Dark")
          ),
          e("span", { style: { color: "rgba(255,255,255,0.15)" } }, "\u2192"),
          e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
            e("div", { style: { width: 28, height: 16, borderRadius: 4, background: Z2.bg, border: "1px solid rgba(0,0,0,0.15)" } }),
            e("span", { style: { fontSize: 11, color: "rgba(255,255,255,0.4)" } }, "White")
          ),
          e("span", { style: { color: "rgba(255,255,255,0.15)" } }, "\u2192"),
          e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
            e("div", { style: { width: 28, height: 16, borderRadius: 4, background: Z3.bg, border: "1px solid rgba(140,140,200,0.2)" } }),
            e("span", { style: { fontSize: 11, color: "rgba(255,255,255,0.4)" } }, "Deep")
          ),
        )
      )
    ),
    /* ── Preview viewport ─── */
    e("div", { style: { maxWidth: 1100, margin: "16px auto 0", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.1)" } },
      e(Preview)
    ),
    e("div", { style: { textAlign: "center", padding: "14px 0 28px", color: "rgba(255,255,255,0.3)", fontSize: 12 } },
      "\u2195 Scroll inside the preview \u2014 watch the dark-to-white-to-dark transition"
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
