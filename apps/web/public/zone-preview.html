function GradientDivider(p) {

  var light = "rgb(" + Math.min(255,Math.round(r*1.2)) + "," + Math.min(255,Math.round(g*1.2)) + "," + Math.min(255,Math.round(b*1.2)) + ")";
  return e("div", { style: { position: "relative", height: 6, overflow: "visible" } },
    e("div", { style: {
      height: 3,

function Preview(p) {
  var z2 = p.z2;

  var wrapperRef = useRef(null);
  var z1Ref = useRef(null);
  var z2Ref = useRef(null);
  var z3Ref = useRef(null);
  var counter = useState(0);
  var forceUpdate = counter[1];

  useEffect(function() {
    /* Reset scroll when palette changes */
    if (wrapperRef.current) wrapperRef.current.scrollTop = 0;
    activeZone.current = 0;
    forceUpdate(function(n) { return n + 1; });
  }, [paletteName]);

  useEffect(function() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && entry.intersectionRatio > 0.2) {
          var newZone = entry.target === z1Ref.current ? 0 : entry.target === z2Ref.current ? 1 : 2;

            forceUpdate(function(n) { return n + 1; });
          }

    }, { threshold: [0.2], root: wrapperRef.current });
    [z1Ref, z2Ref, z3Ref].forEach(function(r) { if (r.current) obs.observe(r.current); });
    return function() { obs.disconnect(); };
  }, [paletteName]);

  var zone = activeZone.current;
  var zones = [Z1, z2, Z3];
  var zCurrent = zones[zone];

  return e("div", { ref: wrapperRef, style: {
    background: zCurrent.bg,
    transition: "background-color 0.7s cubic-bezier(0.16, 1, 0.3, 1)",

    )

}

              e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 6 } },
                e("div", { style: { width: 20, height: 20, borderRadius: 5, background: z2.bg, border: "2px solid " + z2.accent, flexShrink: 0 } }),
                e("span", { style: { fontSize: 13, fontWeight: 700, color: isActive ? z2.accent : "rgba(255,255,255,0.6)" } }, p.emoji + " " + p.name)
              ),
              e("div", { style: { fontSize: 10, color: isActive ? z2.textSecondary : "rgba(255,255,255,0.3)", lineHeight: 1.3 } }, p.desc),
              /* Active indicator dot */
              isActive ? e("div", { style: { position: "absolute", top: 4, right: 4, width: 6, height: 6, borderRadius: 3, background: z2.accent } }) : null
            );
          })
        )
      )
    ),
    /* ── Color swatches row ─── */
    e("div", { style: { maxWidth: 1100, margin: "0 auto", padding: "14px 24px 0", display: "flex", gap: 20, alignItems: "center" } },
      /* Zone 1 swatch */
      e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        e("div", { style: { width: 32, height: 20, borderRadius: 4, background: Z1.bg, border: "1px solid rgba(255,255,255,0.2)" } }),
        e("span", { style: { fontSize: 11, color: "rgba(255,255,255,0.4)" } }, "Z1: #0D0D0D")
      ),
      e("span", { style: { color: "rgba(255,255,255,0.12)", fontSize: 14 } }, "\u2192"),
      /* Zone 2 swatch — animated */
      e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        e("div", { style: { width: 32, height: 20, borderRadius: 4, background: pal.z2.bg, border: "2px solid " + pal.z2.accent, transition: "all 0.4s ease" } }),
        e("span", { style: { fontSize: 11, color: pal.z2.accent, fontWeight: 600, transition: "color 0.4s ease" } }, "Z2: " + pal.z2.bg)
      ),
      e("span", { style: { color: "rgba(255,255,255,0.12)", fontSize: 14 } }, "\u2192"),
      /* Zone 3 swatch */
      e("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        e("div", { style: { width: 32, height: 20, borderRadius: 4, background: Z3.bg, border: "1px solid rgba(140,140,200,0.2)" } }),
        e("span", { style: { fontSize: 11, color: "rgba(255,255,255,0.4)" } }, "Z3: #06060A")
      ),
      /* Surface + accent preview */
      e("div", { style: { marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" } },
        e("div", { style: { width: 20, height: 20, borderRadius: 4, background: pal.z2.surface, border: "1px solid " + pal.z2.border, transition: "all 0.4s ease" } }),
        e("span", { style: { fontSize: 10, color: "rgba(255,255,255,0.3)" } }, "surface"),
        e("div", { style: { width: 20, height: 20, borderRadius: 4, background: pal.z2.accent, transition: "all 0.4s ease" } }),
        e("span", { style: { fontSize: 10, color: "rgba(255,255,255,0.3)" } }, "accent"),
      ),
    ),
    /* ── Preview viewport ─── */
    e("div", { style: { maxWidth: 1100, margin: "14px auto 0", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.1)" } },
      e(Preview, { key: activePalette, z2: pal.z2, paletteName: pal.name })
    ),
    e("div", { style: { textAlign: "center", padding: "14px 0 28px", color: "rgba(255,255,255,0.3)", fontSize: 12 } },
      "\u2195 Scroll inside the preview to see the zone transition \u2014 click a palette above to compare"
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
