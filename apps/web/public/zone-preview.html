<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yalla.House — Zone Transitions</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: #000; color: #fff; }
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
var e = React.createElement;
var useState = React.useState;
var useEffect = React.useEffect;
var useRef = React.useRef;

/* ── ZONE PALETTES ─────────────────────────────────
   Zone 1: Dark    (#0D0D0D) — hero, stats, how it works
   Zone 2: White   (#F5F5F5) — why yalla, three paths
   Zone 3: Deep    (#06060A) — CTA

   The background color is continuously interpolated
   based on scroll position. Text colors flip when the
   background crosses a brightness threshold.
   ──────────────────────────────────────────────────── */

/* Interpolate between two hex colors */
function lerpColor(a, b, t) {
  var ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  var br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  var r = Math.round(ar + (br - ar) * t);
  var g = Math.round(ag + (bg - ag) * t);
  var bv = Math.round(ab + (bb - ab) * t);
  return "rgb(" + r + "," + g + "," + bv + ")";
}

/* Ease-in-out for smoother transitions */
function easeInOut(t) {
  return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
}

/* Get brightness of a color (0-255) */
function brightness(r, g, b) {
  return (r * 299 + g * 587 + b * 114) / 1000;
}

/* ── COMPONENTS ──────────────────────────────────── */

function Hero(p) {
  var d = p.dark;
  var accent = d ? "#D4764E" : "#C4603A";
  return e("div", { style: { padding: "80px 40px 60px", textAlign: "center" } },
    e("div", { style: { display: "flex", justifyContent: "center", gap: 8, marginBottom: 40 } },
      e("button", { style: { background: accent, color: "#fff", border: "none", padding: "8px 20px", borderRadius: 20, fontSize: 14, fontWeight: 600, cursor: "pointer", transition: "background 0.3s" } }, "I'm selling"),
      e("button", { style: { background: d ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.05)", color: d ? "rgba(255,255,255,0.62)" : "#666", border: "1px solid " + (d ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)"), padding: "8px 20px", borderRadius: 20, fontSize: 14, cursor: "pointer", transition: "all 0.3s" } }, "I'm searching"),
    ),
    e("h1", { style: { fontSize: 48, fontWeight: 800, color: d ? "#fff" : "#1A1A1A", lineHeight: 1.1, margin: "0 0 20px", letterSpacing: "-0.022em", transition: "color 0.3s" } },
      "Your property ", e("span", { style: { color: accent, transition: "color 0.3s" } }, "rental"), ",", e("br"), "under your control."
    ),
    e("p", { style: { color: d ? "rgba(255,255,255,0.62)" : "#555", fontSize: 17, maxWidth: 600, margin: "0 auto 32px", lineHeight: 1.5, transition: "color 0.3s" } },
      "Yalla.House is a property technology platform \u2014 not an estate agency. Get a free dashboard with market data, manage viewings, and sell your way."
    ),
    e("div", { style: { display: "flex", justifyContent: "center", gap: 16, alignItems: "center" } },
      e("button", { style: { background: accent, color: "#fff", border: "none", padding: "14px 28px", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer", transition: "background 0.3s" } }, "Create your free dashboard \u2192"),
      e("span", { style: { color: d ? "rgba(255,255,255,0.40)" : "#999", fontSize: 14, transition: "color 0.3s" } }, "I'm an agent \u2192"),
    )
  );
}

function Stats(p) {
  var d = p.dark;
  var accent = d ? "#D4764E" : "#C4603A";
  var stats = [
    { v: "\u00A35,000+", l: "Average agent commission on a UK property sale" },
    { v: "69%", l: "of owners want weekly updates but don't get them" },
    { v: "\u00A30", l: "Cost of your Yalla owner dashboard \u2014 always free" },
    { v: "2 min", l: "to create your dashboard and see your market data" },
  ];
  return e("div", { style: { padding: "40px 40px", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 } },
    stats.map(function(s, i) {
      return e("div", { key: i, style: {
        background: d ? "#161616" : "#FFFFFF", border: "1px solid " + (d ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)"),
        borderRadius: 12, padding: "24px 20px", textAlign: "center", transition: "all 0.3s",
      }},
        e("div", { style: { fontSize: 28, fontWeight: 800, color: accent, marginBottom: 8, transition: "color 0.3s" } }, s.v),
        e("div", { style: { fontSize: 13, color: d ? "rgba(255,255,255,0.62)" : "#555", lineHeight: 1.4, transition: "color 0.3s" } }, s.l)
      );
    })
  );
}

function HowItWorks(p) {
  var d = p.dark;
  var accent = d ? "#D4764E" : "#C4603A";
  var steps = [
    { n: "01", t: "Create your dashboard", d2: "Enter your address and get a free owner dashboard with local market data, comparable sales, and a timeline for your sale." },
    { n: "02", t: "Sell your way", d2: "List privately and manage it yourself, or send your Owner Brief to competing agents. They respond with real proposals \u2014 you compare and choose." },
    { n: "03", t: "Stay in control", d2: "Track every viewing, offer, and update in real time. Whether you're selling privately or through an agent, your dashboard keeps everything in one place." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: d ? "#fff" : "#1A1A1A", textAlign: "center", marginBottom: 12, transition: "color 0.3s" } }, "How it works"),
    e("p", { style: { color: d ? "rgba(255,255,255,0.62)" : "#555", textAlign: "center", marginBottom: 40, fontSize: 15, transition: "color 0.3s" } }, "Three steps. No commission. Full control."),
    e("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 } },
      steps.map(function(s, i) {
        return e("div", { key: i, style: {
          background: d ? "#161616" : "#FFFFFF", border: "1px solid " + (d ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)"),
          borderRadius: 14, padding: "28px 24px", transition: "all 0.3s",
        }},
          e("div", { style: { display: "flex", alignItems: "center", gap: 12, marginBottom: 16 } },
            e("div", { style: { width: 40, height: 40, borderRadius: 10, background: d ? "rgba(212,118,78,0.10)" : "rgba(196,96,58,0.08)", display: "flex", alignItems: "center", justifyContent: "center", transition: "background 0.3s" } },
              e("span", { style: { color: accent, fontSize: 13, fontWeight: 700 } }, "\u2B21")
            ),
            e("span", { style: { fontSize: 12, fontWeight: 700, color: d ? "rgba(255,255,255,0.40)" : "#999", letterSpacing: "0.08em", textTransform: "uppercase", transition: "color 0.3s" } }, "STEP " + s.n)
          ),
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: d ? "#fff" : "#1A1A1A", marginBottom: 12, transition: "color 0.3s" } }, s.t),
          e("p", { style: { fontSize: 14, color: d ? "rgba(255,255,255,0.62)" : "#555", lineHeight: 1.5, margin: 0, transition: "color 0.3s" } }, s.d2)
        );
      })
    )
  );
}

function WhyYalla(p) {
  var d = p.dark;
  var accent = d ? "#D4764E" : "#C4603A";
  var items = [
    { t: "You get a dashboard. Not a bill.", d2: "Every other platform charges you to list. We give you a free dashboard first \u2014 market data, comparable sales, a timeline for your sale." },
    { t: "Your data, always.", d2: "Track every viewing, every offer, every piece of feedback in one place. If you instruct an agent, they connect to your dashboard." },
    { t: "We're not agents. We're your tools.", d2: "Yalla is a technology platform, not an estate agency. We don't take commission. We give you the information and connections to make the best decision." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: d ? "#fff" : "#1A1A1A", textAlign: "center", marginBottom: 48, transition: "color 0.3s" } }, "Why Yalla?"),
    e("div", { style: { maxWidth: 700, margin: "0 auto" } },
      items.map(function(item, i) {
        return e("div", { key: i, style: { borderLeft: "3px solid " + accent, paddingLeft: 24, marginBottom: 36, transition: "border-color 0.3s" } },
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: d ? "#fff" : "#1A1A1A", marginBottom: 8, transition: "color 0.3s" } }, item.t),
          e("p", { style: { fontSize: 14, color: d ? "rgba(255,255,255,0.62)" : "#555", lineHeight: 1.5, margin: 0, transition: "color 0.3s" } }, item.d2)
        );
      })
    )
  );
}

function ThreePaths(p) {
  var d = p.dark;
  var accent = d ? "#D4764E" : "#C4603A";
  var paths = [
    { icon: "\uD83C\uDFE0", t: "For Owners", sub: "Free forever. No commission.", d2: "Get a free dashboard with market data and comparable sales. Sell entirely on your own, or invite agents to compete for your instruction." },
    { icon: "\uD83D\uDD0D", t: "For Home Hunters", sub: "Find your next home.", d2: "Create your Home Passport and we'll search portals on your behalf. We match you with accredited local agents." },
    { icon: "\uD83D\uDCCB", t: "For Agents", sub: "Win new instructions.", d2: "Receive Owner Briefs from motivated sellers in your area. Respond with your proposal and win the instruction \u2014 on merit, not marketing spend." },
  ];
  return e("div", { style: { padding: "60px 40px" } },
    e("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 } },
      paths.map(function(p2, i) {
        return e("div", { key: i, style: {
          background: d ? "#161616" : "#FFFFFF", border: "1px solid " + (d ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.08)"),
          borderRadius: 14, padding: "28px 24px", transition: "all 0.3s",
        }},
          e("div", { style: { width: 44, height: 44, borderRadius: 10, background: d ? "rgba(212,118,78,0.10)" : "rgba(196,96,58,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, marginBottom: 16, transition: "background 0.3s" } }, p2.icon),
          e("h3", { style: { fontSize: 17, fontWeight: 700, color: d ? "#fff" : "#1A1A1A", marginBottom: 4, transition: "color 0.3s" } }, p2.t),
          e("p", { style: { fontSize: 13, color: accent, marginBottom: 12, fontWeight: 600 } }, p2.sub),
          e("p", { style: { fontSize: 14, color: d ? "rgba(255,255,255,0.62)" : "#555", lineHeight: 1.5, margin: "0 0 16px", transition: "color 0.3s" } }, p2.d2),
          e("span", { style: { color: accent, fontSize: 14, fontWeight: 600 } }, "Get started \u2192")
        );
      })
    )
  );
}

function CTA(p) {
  var d = p.dark;
  return e("div", { style: { padding: "80px 40px", textAlign: "center", position: "relative", overflow: "hidden" } },
    e("div", { style: { position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", width: 600, height: 600, borderRadius: "50%", background: "radial-gradient(circle, rgba(212,118,78,0.12) 0%, transparent 70%)", pointerEvents: "none" } }),
    e("h2", { style: { fontSize: 36, fontWeight: 800, color: d ? "#E8E8F0" : "#1A1A1A", marginBottom: 16, position: "relative", transition: "color 0.3s" } }, "Ready to take control", e("br"), "of your sale?"),
    e("p", { style: { color: d ? "rgba(200,200,220,0.55)" : "#555", fontSize: 15, marginBottom: 32, position: "relative", transition: "color 0.3s" } }, "Create your free dashboard in under two minutes."),
    e("button", { style: { background: "#D4764E", color: "#fff", border: "none", padding: "14px 28px", borderRadius: 8, fontSize: 15, fontWeight: 600, cursor: "pointer", position: "relative" } }, "Create your free dashboard \u2192")
  );
}

/* ── ZONE INDICATOR ──────────────────────────────── */
function ZoneIndicator(p) {
  var d = p.dark;
  var zone = p.zone;
  var labels = ["Zone 1 \u2014 Dark", "Zone 2 \u2014 Light", "Zone 3 \u2014 Deep"];
  return e("div", { style: {
    position: "sticky", top: 8, zIndex: 50, display: "flex", justifyContent: "center", pointerEvents: "none",
  }},
    e("div", { style: {
      background: d ? "rgba(255,255,255,0.10)" : "rgba(0,0,0,0.06)",
      backdropFilter: "blur(8px)",
      padding: "6px 16px", borderRadius: 20, fontSize: 12, fontWeight: 700,
      color: d ? "rgba(255,255,255,0.50)" : "#C4603A",
      letterSpacing: "0.05em",
      transition: "all 0.3s",
      border: "1px solid " + (d ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.08)"),
    }}, labels[zone])
  );
}

/* ── SCROLL-DRIVEN PREVIEW ─────────────────────────
   The background color smoothly interpolates as you
   scroll. Text/cards flip between dark and light mode
   based on the background brightness. This creates
   the Netflix "different world" effect.
   ──────────────────────────────────────────────────── */
function Preview() {
  var containerRef = useRef(null);
  var state = useState({ bg: "#0D0D0D", dark: true, zone: 0 });
  var current = state[0];
  var setCurrent = state[1];

  useEffect(function() {
    var el = containerRef.current;
    if (!el) return;

    /* Section positions (approximate percentages of total scroll) */
    /* Zone 1 (dark): 0% – 38%   |  Transition: 38% – 48%
       Zone 2 (white): 48% – 72% |  Transition: 72% – 82%
       Zone 3 (deep): 82% – 100% */

    function onScroll() {
      var top = el.scrollTop;
      var max = el.scrollHeight - el.clientHeight;
      var p = max > 0 ? top / max : 0;

      var r, g, b;

      if (p <= 0.35) {
        /* Pure Zone 1: dark */
        r = 13; g = 13; b = 13;
      } else if (p <= 0.50) {
        /* Transition dark → white */
        var t = easeInOut((p - 0.35) / 0.15);
        r = Math.round(13 + (245 - 13) * t);
        g = Math.round(13 + (245 - 13) * t);
        b = Math.round(13 + (245 - 13) * t);
      } else if (p <= 0.70) {
        /* Pure Zone 2: white */
        r = 245; g = 245; b = 245;
      } else if (p <= 0.85) {
        /* Transition white → deep */
        var t2 = easeInOut((p - 0.70) / 0.15);
        r = Math.round(245 + (6 - 245) * t2);
        g = Math.round(245 + (6 - 245) * t2);
        b = Math.round(245 + (10 - 245) * t2);
      } else {
        /* Pure Zone 3: deep */
        r = 6; g = 6; b = 10;
      }

      var bright = brightness(r, g, b);
      var isDark = bright < 128;
      var zone = p < 0.42 ? 0 : p < 0.76 ? 1 : 2;

      setCurrent({
        bg: "rgb(" + r + "," + g + "," + b + ")",
        dark: isDark,
        zone: zone,
      });
    }

    el.addEventListener("scroll", onScroll, { passive: true });
    return function() { el.removeEventListener("scroll", onScroll); };
  }, []);

  var d = current.dark;

  return e("div", { ref: containerRef, style: {
    background: current.bg,
    overflowY: "auto", maxHeight: 650, position: "relative",
    transition: "none", /* No CSS transition — scroll drives it frame by frame */
  }},
    e(ZoneIndicator, { dark: d, zone: current.zone }),

    /* Zone 1 content */
    e("div", { style: { position: "relative", zIndex: 2 } },
      e(Hero, { dark: d }),
      e(Stats, { dark: d }),
      e(HowItWorks, { dark: d })
    ),

    /* Zone 2 content */
    e("div", { style: { position: "relative", zIndex: 2 } },
      e(WhyYalla, { dark: d }),
      e(ThreePaths, { dark: d })
    ),

    /* Zone 3 content */
    e("div", { style: { position: "relative", zIndex: 2 } },
      e(CTA, { dark: d })
    )
  );
}

/* ── APP SHELL ──────────────────────────────────────── */
function App() {
  return e("div", { style: { minHeight: "100vh", background: "#000" } },
    e("div", { style: { position: "sticky", top: 0, zIndex: 100, background: "rgba(0,0,0,0.92)", backdropFilter: "blur(16px)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "14px 24px" } },
      e("div", { style: { maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" } },
        e("span", { style: { color: "#D4764E", fontWeight: 800, fontSize: 16 } }, "\uD83C\uDFE0 Yalla.House \u2014 Scroll-Driven Zone Effect"),
        e("div", { style: { display: "flex", gap: 8, alignItems: "center", fontSize: 12, color: "rgba(255,255,255,0.4)" } },
          e("div", { style: { width: 20, height: 12, borderRadius: 3, background: "#0D0D0D", border: "1px solid rgba(255,255,255,0.2)" } }),
          "Dark",
          e("span", { style: { color: "rgba(255,255,255,0.15)", margin: "0 4px" } }, "\u2192"),
          e("div", { style: { width: 20, height: 12, borderRadius: 3, background: "#F5F5F5", border: "1px solid rgba(0,0,0,0.15)" } }),
          "White",
          e("span", { style: { color: "rgba(255,255,255,0.15)", margin: "0 4px" } }, "\u2192"),
          e("div", { style: { width: 20, height: 12, borderRadius: 3, background: "#06060A", border: "1px solid rgba(140,140,200,0.2)" } }),
          "Deep",
        )
      )
    ),
    e("div", { style: { maxWidth: 1100, margin: "16px auto 0", borderRadius: 12, overflow: "hidden", border: "1px solid rgba(255,255,255,0.1)" } },
      e(Preview)
    ),
    e("div", { style: { textAlign: "center", padding: "14px 0 28px", color: "rgba(255,255,255,0.3)", fontSize: 12 } },
      "\u2195 Scroll inside the preview \u2014 the background shifts continuously as you scroll, like Netflix"
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>
</body>
</html>
