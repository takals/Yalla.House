/* ── ZONE LABEL (shows which zone is active) ────────── */

function ZoneIndicator(p) {

/* ── STYLE A: Gradient line divider + instant BG shift ── */
function StyleA() {
  var activeZone = useRef(0);
  var wrapperRef = useRef(null);
  var z1Ref = useRef(null);
  var z2Ref = useRef(null);
  var z3Ref = useRef(null);
  var counter = useState(0);
  var forceUpdate = counter[1];

  useEffect(function() {
    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting && entry.intersectionRatio > 0.2) {
          var newZone = entry.target === z1Ref.current ? 0 : entry.target === z2Ref.current ? 1 : 2;
          if (newZone !== activeZone.current) {
            activeZone.current = newZone;
            forceUpdate(function(n) { return n + 1; });
          }
        }
      });
    }, { threshold: [0.2], root: wrapperRef.current });
    [z1Ref, z2Ref, z3Ref].forEach(function(r) { if (r.current) obs.observe(r.current); });
    return function() { obs.disconnect(); };
  }, []);

  var zone = activeZone.current;
  var zones = [Z.z1, Z.z2, Z.z3];
  var zCurrent = zones[zone];

  return e("div", { ref: wrapperRef, style: {
    background: zCurrent.bg,
    transition: "background-color 0.8s cubic-bezier(0.16, 1, 0.3, 1)",
    overflowY: "auto", maxHeight: 650, position: "relative",
  }},
    /* Ambient glow overlay */
    zCurrent.glow !== "none" ? e("div", { style: {
      position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
      background: zCurrent.glow, pointerEvents: "none",
      transition: "opacity 0.8s ease", zIndex: 1,
    }}) : null,
    e(ZoneIndicator, { zone: zone }),
    e("div", { ref: z1Ref, style: { position: "relative", zIndex: 2 } },

    e("div", { ref: z2Ref, style: { position: "relative", zIndex: 2 } },

    ),
    e(GradientDivider, { thick: true }),
    e("div", { ref: z3Ref, style: { position: "relative", zIndex: 2 } },

    )

}

/* ── STYLE B: Wave morph divider + BG shift ─────────── */
function StyleB() {
  var activeZone = useRef(0);

  var z2Ref = useRef(null);
  var z3Ref = useRef(null);

/* ── STYLE C: Continuous scroll-driven interpolation ─── */
function StyleC() {
  var containerRef = useRef(null);
  var state = useState({ progress: 0, zone: 0 });
  var scrollState = state[0];
  var setScrollState = state[1];

  useEffect(function() {
    var el = containerRef.current;
    if (!el) return;
    function onScroll() {
      var top = el.scrollTop;
      var max = el.scrollHeight - el.clientHeight;
      var p = max > 0 ? top / max : 0;
      var zone = p < 0.35 ? 0 : p < 0.75 ? 1 : 2;
      setScrollState({ progress: p, zone: zone });
    }
    el.addEventListener("scroll", onScroll, { passive: true });
    return function() { el.removeEventListener("scroll", onScroll); };
  }, []);

  var p = scrollState.progress;
  /* Zone 1: rgb(13,13,13) → Zone 2: rgb(28,18,11) → Zone 3: rgb(6,6,10) */
  var r1=13,g1=13,b1=13, r2=28,g2=18,b2=11, r3=6,g3=6,b3=10;
  var r, g, b;
  if (p < 0.45) {
    var t = Math.min(p / 0.45, 1);
    /* Ease-in-out curve */
    t = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
    r = Math.round(r1+(r2-r1)*t);
    g = Math.round(g1+(g2-g1)*t);
    b = Math.round(b1+(b2-b1)*t);
  } else {
    var t2 = Math.min((p - 0.45) / 0.55, 1);
    t2 = t2 < 0.5 ? 2*t2*t2 : 1 - Math.pow(-2*t2+2, 2)/2;
    r = Math.round(r2+(r3-r2)*t2);
    g = Math.round(g2+(g3-g2)*t2);
    b = Math.round(b2+(b3-b2)*t2);
  }

  /* Brand glow peaks in the middle */
  var glowIntensity = p < 0.35 ? (p / 0.35) * 0.20 : p < 0.65 ? 0.20 : (1 - (p - 0.65) / 0.35) * 0.20;
  var glowY = 30 + p * 40;

  /* Card style interpolation */
  var zone = scrollState.zone;
  var zones = [Z.z1, Z.z2, Z.z3];
  var zCurrent = zones[zone];

  return e("div", { ref: containerRef, style: {
    background: "radial-gradient(ellipse 80% 60% at 50% " + glowY + "%, rgba(212,118,78," + glowIntensity.toFixed(3) + ") 0%, rgb(" + r + "," + g + "," + b + ") 70%)",
    overflowY: "auto", maxHeight: 650, position: "relative",
  }},
    e(ZoneIndicator, { zone: zone }),
    e("div", { style: { position: "relative", zIndex: 2 } },
      e(Hero, { z: zCurrent }), e(Stats, { z: zCurrent }), e(HowItWorks, { z: zCurrent }),
      e(WhyYalla, { z: zCurrent }), e(ThreePaths, { z: zCurrent }), e(CTA, { z: zCurrent })
    )
  );
}

  return e("div", { style: { minHeight: "100vh", background: "#000" } },
    /* ── Picker bar ─── */
